name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # --- NEW: TESTING SECTION ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-mock httpx  # Ensure testing tools are installed

    - name: Run Unit Tests
      run: |
        pytest test_app.py
    # --- END OF TESTING SECTION ---

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1  # ✅ UPDATE: Match your Lambda's region

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: whatsapp-ai-bot
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build --platform linux/x86_64 -f Dockerfile.aws -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest  # Added: push latest for CDK to reference
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Deploy Infrastructure (CDK)
      run: |
        npm install -g aws-cdk
        pip install aws-cdk-lib constructs
        cd cdk
        cdk bootstrap  # <--- Add this line here
        cdk deploy --all --require-approval never

    - name: Update Lambda Function Code
      env:
        LAMBDA_FUNCTION_NAME: whatsapp-bot-handler
        IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/whatsapp-ai-bot:${{ github.sha }}
      run: |
        aws lambda update-function-code \
          --function-name $LAMBDA_FUNCTION_NAME \
          --image-uri $IMAGE_URI

    - name: Update Ingestion Lambda (ZIP)
      run: |
        # Get function name from stack
        INGESTION_FUNCTION=$(aws cloudformation describe-stacks \
          --stack-name RAGIngestion \
          --query "Stacks[0].Outputs[?contains(OutputKey, 'FunctionName')].OutputValue" \
          --output text)
        
        echo "Deploying to function: $INGESTION_FUNCTION"
        # Package and deploy
        cd app/ingestion
        pip install -r requirements.txt -t package/
        cp main.py package/
        cd package && zip -r ../function.zip . && cd ..
        
        aws lambda update-function-code \
          --function-name $INGESTION_FUNCTION \
          --zip-file fileb://function.zip

